<!DOCTYPE html>
<html lang="eng" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engagment invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
      
<style>
  :root{
    --bg:     #f6f0e6;
    --panel:  #efe6d6;
    --ink:    #3b2a22;
    --accent: #b08d57;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Cairo', sans-serif;
    overflow-x:hidden;
  }
  ::selection{ background:var(--accent); color:var(--bg); }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{ animation:none !important; transition:none !important; }
  }

  /* =========================================================
     ??????: ?????/???? ??????? + ??????????
     ========================================================= */
  .hero{
    position:relative;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    background:var(--panel);
  }
  .bg-photo{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    /* [ADDITION: SMOOTH BACKGROUND] Add transition for smooth movement on scroll */
    transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .bg-photo.has-photo::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(59,42,34,.25) 0%, rgba(59,42,34,.55) 100%);
  }

  /* ????? ??????? - ???? ???? (autoplay/loop) ??????? ?????? ?? ??????? */
  .bg-video{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; display:none; will-change:transform;
    /* [ADDITION: SMOOTH BACKGROUND] Add transition for smooth movement on scroll */
    transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .bg-video.is-active{ display:block; }

  .hero-overlay{
    position:absolute; inset:0; z-index:2;
    background:var(--ink); opacity:0; pointer-events:none;
  }

  .hero-content{ 
    position:relative; z-index:3; text-align:center; padding: 40px 24px; 
    /* [ADDITION: NAME ACCESSIBILITY] Add background for the names */
    background: rgba(59, 42, 34, 0.8); /* Semi-transparent ink background */
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(5px); /* Optional: add a slight blur effect behind the background */
    max-width: 90%; /* Prevent it from being too wide */
  }

  .eyebrow-top{
    font-size:clamp(11px,2vw,13px);
    letter-spacing:.35em;
    color:var(--accent);
    text-transform:uppercase;
    opacity:0; animation:fadeIn .9s ease forwards .15s;
    margin-bottom:20px;
  }

  /* ---- ????? ???????? ???????/??????? ---- */
  .flourish{
    display:block; margin:0 auto;
    color:var(--accent);
    opacity:0;
  }
  .flourish-top{ width:min(78vw, 300px); height:auto; margin-bottom:4px; }
  .flourish-bottom{ width:min(34vw, 120px); height:auto; margin-top:8px; }
  .flourish-path{
    fill:none; stroke:currentColor; stroke-width:2;
    stroke-linecap:round; stroke-linejoin:round;
  }

  .dots-row{
    display:flex; gap:7px; justify-content:center;
    margin:10px 0 18px;
    opacity:0; transform:translateY(6px);
    transition:opacity .6s ease, transform .6s ease;
  }
  .dots-row.show{ opacity:1; transform:translateY(0); }
  .dots-row .dot{ width:4px; height:4px; border-radius:50%; background:var(--accent); }

  .name-row{
    display:flex; align-items:center; justify-content:center; gap:18px;
  }
  .name-line{
    height:1px; background:var(--accent); flex:1; max-width:90px;
    opacity:0; transform:scaleX(0);
    transition:opacity .6s ease, transform .6s ease;
  }
  .name-line.start{ transform-origin:left; }
  .name-line.end{ transform-origin:right; }
  .name-row.show .name-line{ opacity:1; transform:scaleX(1); }

  /* ??????????: ???? Serif ??????? ?? ??? ????? ???? ????? (?? ????? ??????) */
  .monogram{
    display:inline-flex; align-items:baseline; justify-content:center;
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-size:clamp(34px, 8vw, 78px);
    letter-spacing:.05em;
    text-transform:uppercase;
    color:var(--bg); /* Use lighter color for better contrast on dark panel background */
    white-space:nowrap;
  }
  .monogram .amp{ font-style:italic; color:var(--accent); }

  /* ?? ??? ?????? ?????? (???? + ???? ?????) ?? ????? ???? ?? ???????? */
  .monogram .rchar{
    display:inline-block;
    opacity:0;
    filter:blur(6px);
    transform:translateY(14px);
    animation:letterReveal .8s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes letterReveal{
    to{ opacity:1; filter:blur(0); transform:translateY(0); }
  }

  .hero-tagline{
    margin-top:28px;
    font-size:clamp(13px,2.2vw,16px);
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--bg); /* Use lighter color for better contrast on dark panel background */
    opacity:0; transform:translateY(8px);
    transition:opacity .7s ease, transform .7s ease;
  }
  .hero-tagline.show{ opacity:.85; transform:translateY(0); }

  @keyframes fadeIn{ to{ opacity:1; } }

  .scroll-cue{
    position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
    z-index:5; display:flex; flex-direction:column; align-items:center; gap:8px;
    font-size:11px; letter-spacing:.25em; color:var(--ink); opacity:.6;
    text-transform:uppercase;
  }
  .scroll-cue span{
    width:1px; height:30px; background:linear-gradient(var(--accent), transparent);
    animation:scrollPulse 1.8s ease-in-out infinite;
  }
  @keyframes scrollPulse{ 0%{ opacity:.2; } 50%{ opacity:1; } 100%{ opacity:.2; } }

  /* =========================================================
     ??? ????????: ??????? + ??????
     ========================================================= */
  .details{
    position:relative;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:90px 24px 110px;
    background:var(--bg);
  }

  .reveal{ opacity:0; transform:translateY(30px); transition:opacity .8s ease, transform .8s ease; }
  .details.is-visible .reveal{ opacity:1; transform:translateY(0); }
  .details.is-visible .reveal:nth-of-type(1){ transition-delay:.05s; }
  .details.is-visible .reveal:nth-of-type(2){ transition-delay:.2s; }
  .details.is-visible .reveal:nth-of-type(3){ transition-delay:.35s; }
  .details.is-visible .reveal:nth-of-type(4){ transition-delay:.5s; }

  .eyebrow{
    font-size:13px; letter-spacing:.35em; text-transform:uppercase;
    color:var(--accent); margin-bottom:22px;
  }

  .title{
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-style:italic;
    font-size:clamp(26px, 4.2vw, 44px);
    line-height:1.5;
    max-width:680px;
    color:var(--ink);
    margin-bottom:46px;
  }
  .title .word{ display:inline-block; }

  .datetime{
    display:flex; align-items:center; justify-content:center; gap:36px;
    flex-wrap:wrap;
  }
  .dt-block{ text-align:center; }
  .dt-label{
    font-size:12px; letter-spacing:.3em; text-transform:uppercase;
    color:var(--accent); margin-bottom:10px;
  }
  .dt-value{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:clamp(22px, 3.6vw, 30px);
    color:var(--ink);
    letter-spacing:.03em;
  }
  .dt-divider{
    width:1px; height:42px;
    background:var(--accent);
  }

  .closing{
    margin-top:54px;
    font-size:15px;
    color:var(--ink);
    opacity:.75;
    max-width:460px;
  }

  @media (max-width:640px){
    .datetime{ 
    gap:20px; flex-direction:column; }
    .dt-divider{ width:60px; height:1px; }
    .name-line{ max-width:34px; }
  }
</style>
</head>
<body>

    <section class="hero">
    <div class="bg-photo" id="bgPhoto"></div>
<video
  class="bg-video is-active"
  id="bgVideo"
  muted
  autoplay
  loop
  playsinline
  preload="auto"
       >
</video>    
    
    <div class="hero-overlay" id="heroOverlay"></div>

    <div class="hero-content">
      <p class="eyebrow-top" id="eyebrowTop"></p>

      <svg class="flourish flourish-top" viewBox="0 0 300 70" aria-hidden="true">
        <path class="flourish-path" d="
          M150,10 C141,2 131,3 126,11 C121,19 128,27 137,24 C144,22 145,14 139,12
          M150,10 C159,2 169,3 174,11 C179,19 172,27 163,24 C156,22 155,14 161,12
          M126,18 C95,12 62,17 40,32 C27,41 20,46 12,44
          M174,18 C205,12 238,17 260,32 C273,41 280,46 288,44" />
      </svg>

      <div class="dots-row" id="dotsRow">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>

      <div class="name-row" id="nameRow">
        <span class="name-line start"></span>
        <h1 class="monogram" id="monogram"><span id="nameSlot"></span></h1>
        <span class="name-line end"></span>
      </div>

      <svg class="flourish flourish-bottom" viewBox="0 0 120 50" aria-hidden="true">
        <path class="flourish-path" d="
          M60,6 C46,6 36,15 36,25 C36,35 46,40 55,33 C58,30 58,21 54,18
          M60,6 C74,6 84,15 84,25 C84,35 74,40 65,33 C62,30 62,21 66,18" />
      </svg>

      <p class="hero-tagline" id="heroTagline"></p>
    </div>

    <div class="scroll-cue"><span></span>???? ??????</div>
  </section>

    <section class="details" id="details">
    <p class="eyebrow reveal" id="eyebrow"></p>
    <h1 class="title reveal" id="title"></h1>
    <div class="datetime reveal">
      <div class="dt-block">
        <div class="dt-label" id="dateLabel"></div>
        <div class="dt-value" id="dateValue"></div>
      </div>
      <div class="dt-divider"></div>
      <div class="dt-block">
        <div class="dt-label" id="timeLabel"></div>
        <div class="dt-value" id="timeValue"></div>
      </div>
    </div>
    <p class="closing reveal" id="closing"></p>
  </section>

<script>
/* =========================================================
   CONFIG — ???? ????? ??? ??? ??? ???? ????
   ========================================================= */
const CONFIG = {
  nameLeft:  "mohamed",
  nameRight: "yara",
  heroTagline: "Engagement part",
  video: "https://res.cloudinary.com/df5qqg0v0/video/upload/v1782152257/36a1b0b1-7a7e-46db-8025-96e4017c24e8_d431a6.mp4",  
photo: "",
  eyebrowTop: "With love and happiness",
  eyebrow: "Details",
  title: "We invite you to share in the joy of our engagment",
  dateLabel: "Date",
  dateValue: "22 july 2026",
  timeLabel: "At",
  timeValue: "5:00 PM ",
  closing: "We are waiting for you"
};
document.getElementById('eyebrowTop').textContent  = CONFIG.eyebrowTop;
document.getElementById('heroTagline').textContent = CONFIG.heroTagline;
document.getElementById('eyebrow').textContent      = CONFIG.eyebrow;
document.getElementById('dateLabel').textContent    = CONFIG.dateLabel;
document.getElementById('dateValue').textContent    = CONFIG.dateValue;
document.getElementById('timeLabel').textContent    = CONFIG.timeLabel;
document.getElementById('timeValue').textContent    = CONFIG.timeValue;
document.getElementById('closing').textContent      = CONFIG.closing;

/* ---------- خلفية الفيديو أو الصورة ---------- */
const bgVideoEl = document.getElementById('bgVideo');
const bgPhotoEl = document.getElementById('bgPhoto');
let videoReady = false;

if (CONFIG.video) {
  bgVideoEl.src = CONFIG.video;
  bgVideoEl.classList.add('is-active');

  // الفيديو يفضل ثابت على أول فريم لحد ما المستخدم يبدأ يسكرول.
  // اللعبة play/pause دي بس عشان متصفحات الموبايل (سفاري بالأخص)
  // تحمّل أول فريم فعليًا، مش عشان الفيديو يلف لوحده.
bgVideoEl.addEventListener('loadedmetadata', () => {
  videoReady = true;

  bgVideoEl.play().catch(err => {
    console.log(err);
  });
});
  
} else if (CONFIG.photo) {
  bgPhotoEl.style.backgroundImage = `url("${CONFIG.photo}")`;
  bgPhotoEl.classList.add('has-photo');
}

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- بناء الاسم + الفلوريش ---------- */
function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

function buildNameSequence(){
  const seq = [];
  CONFIG.nameLeft.split('').forEach(ch => seq.push({ ch, cls: '' }));
  seq.push({ ch: ' ', cls: 'amp' });
  seq.push({ ch: '&', cls: 'amp' });
  seq.push({ ch: ' ', cls: 'amp' });
  CONFIG.nameRight.split('').forEach(ch => seq.push({ ch, cls: '' }));
  return seq;
}

/* بيضيف كل حروف الاسم دفعة واحدة، كل حرف بتاخير بسيط عشان يظهر بشكل
   زخرفي متتابع (بلور + رفعة خفيفة) مش زي كيرسور كيبورد بيكتب */
function revealName(){
  const seq = buildNameSequence();
  const container = document.getElementById('nameSlot');
  seq.forEach((item, i) => {
    const span = document.createElement('span');
    span.className = (item.cls ? item.cls + ' ' : '') + 'rchar';
    span.style.animationDelay = (i * 0.06) + 's';
    span.textContent = item.ch;
    container.appendChild(span);
  });
  return seq.length;
}

function prepareFlourish(el){
  const path = el.querySelector('.flourish-path');
  const len = path.getTotalLength();
  path.style.strokeDasharray = len;
  path.style.strokeDashoffset = len;
  return path;
}

function drawFlourish(el, path){
  el.style.transition = 'opacity .5s ease';
  el.style.opacity = '1';
  requestAnimationFrame(() => {
    path.style.transition = 'stroke-dashoffset 1.1s ease';
    path.style.strokeDashoffset = '0';
  });
}

const flourishTopEl    = document.querySelector('.flourish-top');
const flourishBottomEl = document.querySelector('.flourish-bottom');

if (reduceMotion) {
  document.getElementById('nameSlot').textContent = CONFIG.nameLeft + ' & ' + CONFIG.nameRight;
  flourishTopEl.style.opacity = '1';
  flourishBottomEl.style.opacity = '1';
  document.getElementById('dotsRow').classList.add('show');
  document.getElementById('nameRow').classList.add('show');
  document.getElementById('heroTagline').classList.add('show');
} else {
  const pathTop    = prepareFlourish(flourishTopEl);
  const pathBottom = prepareFlourish(flourishBottomEl);

  (async () => {
    await sleep(300);
    drawFlourish(flourishTopEl, pathTop);

    await sleep(150);
    const letterCount = revealName();
    await sleep(letterCount * 60 + 750); // وقت كافي لظهور كل الحروف بزخرفتها

    document.getElementById('dotsRow').classList.add('show');
    await sleep(150);
    document.getElementById('nameRow').classList.add('show');

    await sleep(250);
    drawFlourish(flourishBottomEl, pathBottom);

    await sleep(500);
    document.getElementById('heroTagline').classList.add('show');
  })();
}

/* تقسيم عنوان قسم التفاصيل لكلمات */
const titleEl = document.getElementById('title');
CONFIG.title.split(' ').forEach(word => {
  const span = document.createElement('span');
  span.className = 'word';
  span.textContent = word + '\u00A0';
  titleEl.appendChild(span);
});

/* ---------- ظهور قسم التفاصيل عند السكرول ---------- */
const detailsSection = document.getElementById('details');
const sectionObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) detailsSection.classList.add('is-visible');
  });
}, { threshold: 0.25 });
sectionObserver.observe(detailsSection);

/* ---------- السكرول يتحكم في فريم الفيديو زي شريط فيديو حقيقي
   (الفيديو ثابت، وموقع السكرول هو اللي يحدد الفريم المعروض)
   مع حماية من اللاج: مفيش seek جديد إلا بعد ما اللي قبله يخلص ---------- */
const heroEl = document.querySelector('.hero');
const heroOverlayEl = document.getElementById('heroOverlay');
const bgLayer = bgVideoEl.classList.contains('is-active')
  ? bgVideoEl
  : bgPhotoEl;

if (!reduceMotion) {

  let ticking = false;

  function updateOnScroll() {
    const heroHeight = heroEl.offsetHeight;
    const progress = Math.min(
      Math.max(window.scrollY / heroHeight, 0),
      1
    );

    const scale = 1 + progress * 0.35;
    const lift = progress * 120;

    bgLayer.style.transform =
      `scale(${scale}) translate3d(0, ${-lift}px, 0)`;

    heroOverlayEl.style.opacity = progress * 0.65;

    document.querySelector('.hero-content').style.transform =
      `translateY(${progress * 80}px)`;

    document.querySelector('.hero-content').style.opacity =
      1 - (progress * 0.7);

    ticking = false;
  }

  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(updateOnScroll);
      ticking = true;
    }
  });

  updateOnScroll();
}
</script>
</body>
</html>
